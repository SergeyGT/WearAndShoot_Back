<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — WS</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">
    
    <!-- Иконки (опционально) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .card-header {
            background: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .form-control-lg {
            border-radius: 0.75rem;
        }
        .btn-register {
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
        }
        .text-muted-small {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card mt-5 mb-5">
                <div class="card-header">
                    <h3 class="mb-0 fw-bold text-dark">Создать аккаунт</h3>
                    <p class="text-muted mt-2">Заполните данные для регистрации</p>
                </div>

                <div class="card-body p-4 p-md-5">

                    <!-- Здесь можно добавить показ ошибок валидации, если подключишь @Valid + BindingResult -->
                    <!-- Пока просто базовая форма -->

                    <form th:action="@{/auth/register}" th:object="${registrationDTO}" method="post">

                        <!-- Username -->
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold">Имя пользователя</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" 
                                       th:field="*{username}" 
                                       class="form-control form-control-lg" 
                                       id="username" 
                                       placeholder="yourname123" 
                                       required 
                                       autofocus>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" 
                                       th:field="*{email}" 
                                       class="form-control form-control-lg" 
                                       id="email" 
                                       placeholder="name@example.com" 
                                       required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Пароль</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" 
                                       th:field="*{password}" 
                                       class="form-control form-control-lg" 
                                       id="password" 
                                       placeholder="••••••••" 
                                       required>
                            </div>
                        </div>

                        <!-- Кнопка отправки -->
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg btn-register">
                                Зарегистрироваться
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-4 text-muted-small">
                        Уже есть аккаунт? 
                        <a href="#" th:href="@{/login}" class="text-primary fw-medium text-decoration-none">Войти</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS (опционально, если нужны всплывающие подсказки и т.д.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
        crossorigin="anonymous"></script>

</body>
</html>
